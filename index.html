
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dongwan ♥ Heesang Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#f5f2eb;
font-family:'Noto Serif KR',serif;
text-align:center;
color:#333;
}

/* Envelope */

.envelope{
width:320px;
margin:120px auto;
cursor:pointer;
perspective:1000px;
}

.flap{
width:100%;
height:160px;
background:#111;
clip-path:polygon(0 0,100% 0,50% 100%);
transition:0.8s;
transform-origin:top;
}

.letter{
background:#fff;
padding:40px;
display:none;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.open .flap{
transform:rotateX(180deg);
}

.open .letter{
display:block;
animation:fade 1s;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1}
}

.name{
font-family:'Great Vibes',cursive;
font-size:42px;
margin:20px 0;
}

.section{
padding:60px 20px;
}

.gallery{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
padding:10px;
}

.gallery img{
width:100%;
border-radius:6px;
}

.button{
display:inline-block;
padding:12px 18px;
margin:6px;
background:#eee;
border-radius:10px;
text-decoration:none;
color:#333;
}

</style>
</head>

<body>

<div class="envelope" onclick="openEnvelope()">

<div class="flap"></div>

<div class="letter">

<p>SAVE THE DATE</p>

<div class="name">
Dongwan <br>&<br> Heesang
</div>

<p>
2026.04.18 SAT<br>
18:30
</p>

</div>

</div>

<div class="section">

<h2>초대합니다</h2>

<p>
따스한 4월<br>
오랜 기다림 끝에<br>
부부의 연을 맺기로 하였습니다.<br><br>
소중한 걸음으로<br>
저희의 시작을 함께해 주세요.
</p>

</div>

<div class="section">

<h2>Gallery</h2>

<div class="gallery">
<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
</div>

</div>

<div class="section">

<h2>Wedding</h2>

<p>
2026년 4월 18일 토요일<br>
오후 6시 30분<br><br>
빌라드지디 청담
</p>

</div>

<script>
function openEnvelope(){
document.querySelector(".envelope").classList.toggle("open");
}
</script>

</body>
</html>
